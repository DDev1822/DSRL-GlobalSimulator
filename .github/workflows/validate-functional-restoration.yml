name: Validate functional restoration

on:
  push:
    branches:
      - fix/original-figma-datamine-viewer
  pull_request:
    branches:
      - feat/bootstrap-figma-simulator

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run validate:data
      - run: npm run typecheck
      - run: npm run build
