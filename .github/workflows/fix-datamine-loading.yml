name: Fix Datamine loading lifecycle

on:
  push:
    branches:
      - fix/original-figma-datamine-viewer
    paths:
      - '.github/datamine-loading-trigger'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/original-figma-datamine-viewer
          fetch-depth: 0

      - name: Patch Datamine geometry loading effect
        shell: python
        run: |
          from pathlib import Path

          path = Path('src/App.tsx')
          source = path.read_text(encoding='utf-8')

          old = '''  // Load Phase 6 geometry when entering Datamine mode
          useEffect(() => {
            if (
              pitMode !== 'datamine' ||
              phase6Geometry ||
              isLoadingGeometry ||
              geometryError
            ) {
              return;
            }

            let cancelled = false;
            setIsLoadingGeometry(true);

            parsePhase6Geometry()
              .then((geometry) => {
                if (cancelled) return;
                setPhase6Geometry(geometry);
                setGeometryError(null);
                console.log('Phase 6 Geometry Loaded:', geometry.validation);
              })
              .catch((error: unknown) => {
                if (cancelled) return;
                const message = error instanceof Error
                  ? error.message
                  : 'No se pudo cargar la geometría Datamine.';
                console.error('Error loading Phase 6 geometry:', error);
                setPhase6Geometry(null);
                setGeometryError(message);
              })
              .finally(() => {
                if (!cancelled) setIsLoadingGeometry(false);
              });

            return () => {
              cancelled = true;
            };
          }, [pitMode, phase6Geometry, isLoadingGeometry, geometryError]);'''

          new = '''  // Load Phase 6 geometry when entering Datamine mode.
          // `isLoadingGeometry` is deliberately not a dependency: adding it here
          // cancels the active request immediately after setting the loading flag.
          useEffect(() => {
            if (
              pitMode !== 'datamine' ||
              phase6Geometry ||
              geometryError
            ) {
              return;
            }

            let active = true;
            setIsLoadingGeometry(true);

            parsePhase6Geometry()
              .then((geometry) => {
                if (!active) return;
                setPhase6Geometry(geometry);
                setGeometryError(null);
                console.log('Phase 6 Geometry Loaded:', geometry.validation);
              })
              .catch((error: unknown) => {
                if (!active) return;
                const message = error instanceof Error
                  ? error.message
                  : 'No se pudo cargar la geometría Datamine.';
                console.error('Error loading Phase 6 geometry:', error);
                setPhase6Geometry(null);
                setGeometryError(message);
              })
              .finally(() => {
                if (active) setIsLoadingGeometry(false);
              });

            return () => {
              active = false;
            };
          }, [pitMode, phase6Geometry, geometryError]);'''

          if old not in source:
              raise SystemExit('Expected Datamine loading effect was not found.')

          path.write_text(source.replace(old, new, 1), encoding='utf-8')

      - name: Commit fix and remove temporary workflow
        shell: bash
        run: |
          rm -f .github/datamine-loading-trigger
          rm -f .github/workflows/fix-datamine-loading.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: resolve Datamine geometry loading deadlock"
          git push origin HEAD:fix/original-figma-datamine-viewer
